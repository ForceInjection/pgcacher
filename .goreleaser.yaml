# goreleaser configuration for pgcacher
# See https://goreleaser.com for full documentation.
# GitHub Actions workflow: .github/workflows/release.yml
version: 2

project_name: pgcacher

before:
  hooks:
    - go mod tidy

builds:
  - id: pgcacher
    main: .
    binary: pgcacher
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    # Produces e.g. pgcacher_v0.4.0_Linux_x86_64.tar.gz, compatible with `uname`.
    name_template: >-
      {{ .ProjectName }}_v{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - docs/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

