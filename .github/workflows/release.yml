name: release

# Build and publish release artifacts via goreleaser when a version tag is pushed.
# Tag format: vX.Y.Z  (e.g. git tag v0.4.0 && git push origin v0.4.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release
  packages: write   # allow publishing associated packages if configured later

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs the full history for changelog generation

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true
          cache: true

      - name: Verify build and tests
        run: |
          go vet ./...
          go test -count=1 ./...

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
